app = "blender-agent"
primary_region = "ord"

[build]
dockerfile = "Dockerfile"

[env]
HERMES_UID = "10000"
HERMES_GID = "10000"
API_SERVER_ENABLED = "true"
API_SERVER_HOST = "0.0.0.0"
API_SERVER_PORT = "8642"

[[mounts]]
source = "blender_data"
destination = "/opt/data"
initial_size = "5gb"

[[vm]]
memory = "2gb"
cpu_kind = "shared"
cpus = 1

[experimental]
cmd = ["gateway", "run"]

[http_service]
internal_port = 8642
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
interval = "30s"
timeout = "5s"
grace_period = "30s"
method = "GET"
path = "/health"

[deploy]
strategy = "immediate"
