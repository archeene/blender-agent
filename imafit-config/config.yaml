# Hermes Agent config for IMA Worcester / IMA Fit social media manager
# Loaded into ~/.hermes/config.yaml inside the container at first boot.

model:
  default: "nousresearch/hermes-4-405b"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

# OpenRouter API key comes from OPENROUTER_API_KEY env var (Fly secret).
# API_SERVER_KEY comes from env var (Fly secret).
